project:
  type: website
  output-dir: docs
  pre-render:
    - python3 scripts/build_photo_manifest.py
  resources:
    - img/**
    - assets/**
    - _generated/photo-manifest.js

website:
  title: "ASJ Photography"
  favicon: assets/images/site/logo.png

format:
  html:
    theme: cosmo
    css: assets/styles/site.css
    toc: false
    include-before-body: _generated/site-header.html
